services:
  db:
    image: postgres:latest
    container_name: beontech-postgres
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=test123!
      - POSTGRES_DB=beontech
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
